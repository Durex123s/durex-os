name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer Java (nécessaire pour Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Installer les dépendances
        run: npm install

      - name: Construire l'app web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Synchroniser Capacitor avec Android
        run: node_modules/.bin/cap sync android

      - name: Préparer la signature (décodée depuis les secrets, jamais committée)
        working-directory: android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > veyrion-release.keystore
          cat > keystore.properties << EOF
          storeFile=veyrion-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Compiler l'APK (installable directement sur un téléphone)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Compiler l'AAB de production (pour soumission au Play Store)
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Compiler l'APK release (pour tester le build de prod avant soumission)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Nettoyer les fichiers de signature (sécurité)
        if: always()
        working-directory: android
        run: rm -f veyrion-release.keystore keystore.properties

      - name: Publier l'APK générée
        uses: actions/upload-artifact@v4
        with:
          name: veyrion-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publier l'AAB de production
        uses: actions/upload-artifact@v4
        with:
          name: veyrion-aab-playstore
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Publier l'APK release (test avant soumission)
        uses: actions/upload-artifact@v4
        with:
          name: veyrion-apk-release
          path: android/app/build/outputs/apk/release/app-release.apk
